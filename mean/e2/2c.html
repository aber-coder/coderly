<!DOCTYPE html>
<html>
  <head>
    <title>iekart signup</title>
  </head>
  <body>
    <h1>iekart signup</h1>
    <form>
      <label
        >username:
        <input
          type="text"
          name="username"
          required
          minlength="6"
          maxlength="20"
          pattern="[a-zA-Z0-9]+"
        />
      </label>
      <p>
        must be between 6 and 20 characters and contain only letters and
        numbers.
      </p>

      <label
        >email:
        <input type="email" name="email" required />
      </label>
      <p>enter a valid email address.</p>

      <label
        >password:
        <input type="password" name="password" required minlength="8" />
      </label>
      <p>must be at least 8 characters long.</p>

      <label
        >confirm password:
        <input type="password" name="confirm-password" required minlength="8" />
      </label>
      <p>must be at least 8 characters long.</p>

      <label
        >date of birth:
        <input type="date" name="dob" required min="2005-01-01" />
      </label>
      <p>you must be at least 18 years old to signup.</p>

      <label
        >gender:
        <select name="gender" required>
          <option value="">select gender</option>
          <option value="male">male</option>
          <option value="female">female</option>
          <option value="other">other</option>
        </select>
      </label>

      <label
        >favorite color:
        <input type="color" name="favorite-color" />
      </label>
      <p>choose your favorite color.</p>

      <label
        >interests:
        <input type="text" name="interests" />
      </label>
      <input type="submit" value="signup" />
    </form>
  </body>
</html>
